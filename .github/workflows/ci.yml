name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: etip
          POSTGRES_PASSWORD: changeme
          POSTGRES_DB: etip
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U etip -d etip"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    env:
      ENVIRONMENT: test
      DEBUG: "false"
      POSTGRES_HOST: localhost
      POSTGRES_PORT: "5432"
      POSTGRES_USER: etip
      POSTGRES_PASSWORD: changeme
      POSTGRES_DB: etip
      MONGODB_URL: mongodb://localhost:27017
      MONGODB_DB_NAME: etip_raw_intel
      JWT_SECRET_KEY: ci-test-secret-key-not-for-production-use-please-change
      JWT_ALGORITHM: HS256
      ACCESS_TOKEN_EXPIRE_MINUTES: "30"
      REFRESH_TOKEN_EXPIRE_DAYS: "7"
      CORS_ORIGINS: '["http://localhost:3000"]'
      LOG_LEVEL: INFO
      RATE_LIMIT_PER_MINUTE: "60"
      AUTH_RATE_LIMIT_PER_MINUTE: "5"
      SCRAPER_REQUEST_TIMEOUT: "30"
      SCRAPER_USER_AGENT: ETIP-Bot/1.0

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true
          cache-dependency-glob: uv.lock

      - name: Install dependencies
        run: uv sync --locked

      - name: Run tests
        run: uv run pytest -v
